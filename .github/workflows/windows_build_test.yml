name: windows_build_test
on: [pull_request]
env:
  SOLUTION_FILE_PATH: RhythmActionGame.sln

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        configuration:
          - Debug
          - Release
    
    runs-on: self-hosted
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
    
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64
    
      - name: Build
        shell: pwsh
        run: |
          $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
          $logfile = "BuildLog-${{ matrix.configuration }}-$timestamp.log"
          "LOGFILE=$logfile" >> $env:GITHUB_ENV

          
          Write-Host "Building solution with configuration: ${{ matrix.configuration }}"
          msbuild $env:SOLUTION_FILE_PATH /t:Clean /p:Platform=x64,Configuration=${{ matrix.configuration }}
          msbuild $env:SOLUTION_FILE_PATH /t:Build /p:Platform=x64,Configuration=${{ matrix.configuration }} | Tee-Object -FilePath $logfile
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Build failed. Check the log file: $logfile"
            exit $LASTEXITCODE
          }
      
      - name: Upload log to Discord
        if: failure()
        shell: pwsh
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOKURL_LOGGER }}
        run: |
          pwsh --version
          if (-Not (Test-Path $env:LOGFILE)) {
            Write-Host "Log file not found. Exiting."
            exit 1
          }

          $payload = @{
            embeds = @(
              @{
                title = "Job Failed (${{ matrix.configuration }})"
                url = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                color = 15548997

                author = @{
                  name = "GitHub Actions"
                  url = "https://github.com/Souto-Naitou/BEATSLASH/actions"
                  icon_url = "https://drive.google.com/uc?id=1Qp-YcNpbMzaXENi8c7wvss6CzZ5-J4rG"
                }

                fields = @(
                  @{
                    name = "PR"
                    value = "[${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }})"
                    inline = $false
                  },
                  @{
                    name = "Branch"
                    value = "${{ github.head_ref }}"
                    inline = $true
                  },
                  @{
                    name = "Author"
                    value = "${{ github.event.pull_request.user.login }}"
                    inline = $true
                  }
                )
              }
            )
          }

          $json = $payload | ConvertTo-Json -Depth 10 -Compress

          Write-Host "Sending payload to Discord webhook..."
          Invoke-RestMethod `
            -Uri $env:WEBHOOK `
            -Method Post `
            -ContentType "application/json" `
            -Body $json

          Write-Host "Uploading log file to Discord webhook..."
          curl.exe `
            -F "file1=@$env:LOGFILE" `
            $env:WEBHOOK


