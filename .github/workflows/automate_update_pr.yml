name: Auto Update Filters

on:
  push:
    branches:
      - main

concurrency:
  group: update-main
  cancel-in-progress: false

jobs:
  update:
    if: github.event.head_commit.message != 'Auto generated update'
    runs-on: windows-latest

    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Generate
        shell: powershell
        run: |
          .\automation\Run-Generate-VcxprojFilters.bat

      - name: Commit and Push
        shell: powershell
        run: |
          git config user.name "Actions App - Alpha"
          git config user.email "AA_Alpha@users.noreply.github.com"

          if (git status --porcelain) {
              git add .
              git commit -m "Auto generated update"

              git pull --rebase origin main
              git push origin HEAD:main
          }
